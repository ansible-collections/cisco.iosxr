---
- name: "Setup"
  cisco.iosxr.iosxr_config:
    lines:
      - "router bgp 65536"
      - "bgp cluster-id 5"
      - "bgp router-id 192.0.2.10"
      - "bgp bestpath med confed"
      - "bgp confederation identifier 4"
      - "default-metric 4"
      - "socket receive-buffer-size 514"
      - "socket send-buffer-size 4098"
      - "neighbor-group test_ng"
      - "session-group test_sg"
      - "neighbor 192.0.2.11"
      - "cluster-id 3"
      - "remote-as 65537"
      - "neighbor 192.0.2.14"
      - "bfd fast-detect strict-mode"
      - "bfd minimum-interval 20"
      - "bfd multiplier 6"
      - "remote-as 65538"
      - "neighbor 203.0.113.10"
      - "remote-as 5467.8"
      - "neighbor 203.0.113.11"
      - "remote-as 65001"
      - "neighbor 203.0.113.12"
      - "remote-as 4394.6"
      - "shutdown"
      - "vrf vrf_asdot"
      - "neighbor 198.51.100.100"
      - "remote-as 65540"
      - "neighbor 198.51.100.101"
      - "remote-as 2.5"
      - "neighbor 198.51.100.99"
      - "remote-as 1.0"

  vars:
    ansible_connection: ansible.netcommon.network_cli
