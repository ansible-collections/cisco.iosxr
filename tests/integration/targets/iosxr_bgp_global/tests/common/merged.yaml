---
- ansible.builtin.debug:
    msg: Start iosxr_bgp_global merged integration tests connection={{ ansible_connection}}

- ansible.builtin.include_tasks: _remove_config.yaml

- block:
    - name: Merge the provided configuration with the existing running configuration
      cisco.iosxr.iosxr_bgp_global: &id001
        config:
          as_number: 65536
          default_metric: 4
          socket:
            receive_buffer_size: 514
            send_buffer_size: 4098
          bgp:
            confederation:
              identifier: 4
            bestpath:
              med:
                confed: true
            cluster_id: 5
            router_id: 192.0.2.10
          neighbors:
            # remote_as: int (ASPLAIN), str (ASDOT), YAML float (ASDOT) -> facts are strings
            - neighbor: 192.0.2.11
              remote_as: 65537
              cluster_id: 3
              shutdown:
                set: false
            - neighbor: 192.0.2.14
              remote_as: 65538
              bfd:
                fast_detect:
                  strict_mode: true
                multiplier: 6
                minimum_interval: 20
            - neighbor: 203.0.113.10
              remote_as: "5467.8"
            - neighbor: 203.0.113.11
              remote_as: 65001
            - neighbor: 203.0.113.12
              remote_as: 4394.6
              shutdown:
                set: true
          vrfs:
            - vrf: vrf_asdot
              # VRF neighbors: str, int, YAML float for remote_as (fact list is sorted by address)
              neighbors:
                - neighbor: 198.51.100.100
                  remote_as: 65540
                - neighbor: 198.51.100.101
                  remote_as: 2.5
                - neighbor: 198.51.100.99
                  remote_as: "1.0"
      register: result

    - name: Assert that before dicts were correctly generated
      ansible.builtin.assert:
        that: "{{ result['before'] == {} }}"

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - "{{ merged['commands'] | symmetric_difference(result['commands']) |length == 0 }}"

    - name: Assert that after dicts were correctly generated
      ansible.builtin.assert:
        that:
          - merged['after'] == result['after']

    - name: Merge the provided configuration with the existing running configuration (idempotent)
      cisco.iosxr.iosxr_bgp_global: *id001
      register: result

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result['changed'] == false
          - result.commands|length == 0

    - name: Start a neighbor in shutdown state
      cisco.iosxr.iosxr_bgp_global:
        config:
          as_number: 65536
          neighbors:
            - neighbor: 203.0.113.12
              shutdown:
                set: false
      register: result

    - name: Assert that the previous task was successful
      ansible.builtin.assert:
        that:
          - result['changed'] == true
          - '"no shutdown" in result.commands'
  always:
    - ansible.builtin.include_tasks: _remove_config.yaml

# --- bmp_activate.server merged (requires BMP server pre-configured) ---
- block:
    - name: Setup BMP server 1 with host/port (device prerequisite for bmp-activate)
      cisco.iosxr.iosxr_config:
        lines:
          - "host 1.2.3.4 port 12345"
        parents:
          - "bmp server 1"

    - name: Merge neighbor with bmp_activate.server 1 — expect changed
      cisco.iosxr.iosxr_bgp_global: &bmp_activate_id
        config:
          as_number: 65536
          neighbors:
            - neighbor: 192.0.2.11
              remote_as: 65537
              bmp_activate:
                server: 1
        state: merged
      register: result

    - name: Assert bmp-activate server 1 was generated
      ansible.builtin.assert:
        that:
          - result.changed
          - '"bmp-activate server 1" in result.commands'

    - name: Merge same config again (idempotent)
      cisco.iosxr.iosxr_bgp_global: *bmp_activate_id
      register: result

    - name: Assert idempotent run did not change
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands | length == 0

  always:
    - name: Cleanup — remove bmp-activate from neighbor
      cisco.iosxr.iosxr_config:
        lines:
          - "no bmp-activate server 1"
        parents:
          - "router bgp 65536"
          - "neighbor 192.0.2.11"
      ignore_errors: true

    - name: Cleanup — remove BMP server 1
      cisco.iosxr.iosxr_config:
        lines:
          - "no bmp server 1"
      ignore_errors: true

    - ansible.builtin.include_tasks: _remove_config.yaml
