---
merged:
  commands:
    - router bgp 65536
    - bgp cluster-id 5
    - bgp router-id 192.0.2.10
    - bgp bestpath med confed
    - bgp confederation identifier 4
    - default-metric 4
    - socket receive-buffer-size 514
    - socket send-buffer-size 4098
    - neighbor 192.0.2.11
    - cluster-id 3
    - remote-as 65537
    - neighbor 192.0.2.14
    - bfd fast-detect strict-mode
    - bfd minimum-interval 20
    - bfd multiplier 6
    - remote-as 65538
    - neighbor 203.0.113.10
    - remote-as 5467.8
    - neighbor 203.0.113.11
    - remote-as 65001
    - neighbor 203.0.113.12
    - remote-as 4394.6
    - vrf vrf_asdot
    - neighbor 198.51.100.100
    - remote-as 65540
    - neighbor 198.51.100.101
    - remote-as 2.5
    - neighbor 198.51.100.99
    - remote-as 1.0
  after:
    # Expected facts use quoted remote_as strings (normalized module output). Playbook task
    # keys may still use integer ASPLAIN or quoted ASDOT strings (see merged.yaml).
    as_number: "65536"
    default_metric: 4
    socket:
      receive_buffer_size: 514
      send_buffer_size: 4098
    bgp:
      confederation:
        identifier: 4
      bestpath:
        med:
          confed: true
      cluster_id: "5"
      router_id: "192.0.2.10"
    neighbors:
      - neighbor_address: 192.0.2.11
        remote_as: "65537"
        cluster_id: "3"
      - neighbor_address: "192.0.2.14"
        remote_as: "65538"
        bfd:
          fast_detect:
            strict_mode: true
          multiplier: 6
          minimum_interval: 20
      - neighbor_address: 203.0.113.10
        remote_as: "5467.8"
      - neighbor_address: 203.0.113.11
        remote_as: "65001"
      - neighbor_address: 203.0.113.12
        remote_as: "4394.6"
    # VRF neighbor lists follow string sort of neighbor_address (e.g. .100 before .99).
    vrfs:
      - vrf: vrf_asdot
        neighbors:
          - neighbor_address: 198.51.100.100
            remote_as: "65540"
          - neighbor_address: 198.51.100.101
            remote_as: "2.5"
          - neighbor_address: 198.51.100.99
            remote_as: "1.0"

deleted:
  after:
    as_number: "65536"

replaced:
  commands:
    - router bgp 65536
    - no bgp confederation identifier 4
    - default-metric 5
    - neighbor 192.0.2.13
    - use neighbor-group test_ng
    - use session-group test_sg
    - bfd fast-detect
    - bfd minimum-interval 20
    - bfd multiplier 6
    - local-as 65539 no-prepend replace-as
    - password inheritance-disable
    - remote-as 65538
    - neighbor 192.0.2.14
    - no bfd fast-detect strict-mode
    - no bfd minimum-interval 20
    - no bfd multiplier 6
    - remote-as 65539
    - neighbor 192.0.2.15
    - remote-as 5467.5
    - no neighbor 192.0.2.11
    - no neighbor 203.0.113.10
    - no neighbor 203.0.113.11
    - no neighbor 203.0.113.12
    - no vrf vrf_asdot
  after:
    as_number: "65536"
    default_metric: 5
    socket:
      receive_buffer_size: 514
      send_buffer_size: 4098
    bgp:
      bestpath:
        med:
          confed: true
      cluster_id: "5"
      router_id: "192.0.2.10"
    neighbors:
      - neighbor_address: "192.0.2.13"
        remote_as: "65538"
        use:
          neighbor_group: test_ng
          session_group: test_sg
        password:
          inheritance_disable: true
        local_as:
          value: 65539
          no_prepend:
            replace_as:
              set: true
        bfd:
          fast_detect:
            set: true
          multiplier: 6
          minimum_interval: 20
      - neighbor_address: "192.0.2.14"
        remote_as: "65539"
      - neighbor_address: "192.0.2.15"
        remote_as: "5467.5"

rendered:
  commands:
    - router bgp 65536
    - bgp cluster-id 5
    - bgp router-id 192.0.2.10
    - bgp bestpath med confed
    - bgp confederation identifier 4
    - default-metric 4
    - socket receive-buffer-size 514
    - socket send-buffer-size 4098
    - neighbor 192.0.2.11
    - cluster-id 3
    - remote-as 65537
