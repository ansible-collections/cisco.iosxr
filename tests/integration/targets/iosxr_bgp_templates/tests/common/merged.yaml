---
- ansible.builtin.debug:
    msg: Start iosxr_bgp_templates merged integration tests connection={{ ansible_connection}}

- ansible.builtin.include_tasks: _remove_config.yaml

- block:
    - name: Merge the provided configuration with the existing running configuration
      cisco.iosxr.iosxr_bgp_templates: &id001
        config:
          as_number: 65536
          neighbor:
            # First two full neighbor-groups; then remote_as only: int / str / YAML float (ng-remote + ng-rs)
            - address_family:
                - advertise:
                    local_labeled_route:
                      set: true
                  afi: ipv4
                  safi: unicast
              advertisement_interval: 10
              bfd:
                fast_detect:
                  strict_mode: true
              internal_vpn_client: true
              name: neighbor-group1
              precedence: critical
            - cluster_id: "1"
              description: neighbor-group2
              dmz_link_bandwidth:
                set: true
              ebgp_multihop:
                value: 255
              egress_engineering:
                set: true
              graceful_maintenance:
                as_prepends:
                  value: 0
                set: true
              ignore_connected_check:
                set: true
              internal_vpn_client: true
              local:
                address:
                  inheritance_disable: true
              local_as:
                value: 6
              name: neighbor-group2
              precedence: flash
              receive_buffer_size: 512
              send_buffer_size: 4096
              session_open_mode: both
              tcp:
                mss:
                  inheritance_disable: true
              ttl_security:
                set: true
              update_source: Loopback919
            - name: ng-remote-asdot
              remote_as: "5467.8"
            - name: ng-remote-plain
              remote_as: 65001
            - name: ng-rs-float
              remote_as: 88.5
            - name: ng-rs-int
              remote_as: 424242
            - name: ng-rs-str
              remote_as: "123.4"
      register: result

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - "{{ merged['commands'] | symmetric_difference(result['commands']) |length == 0 }}"

    - name: Assert that after dicts were correctly generated
      ansible.builtin.assert:
        that:
          - merged['after'] == result['after']

    - name: Merge the provided configuration with the existing running configuration (idempotent)
      cisco.iosxr.iosxr_bgp_templates: *id001
      register: result

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result['changed'] == false
          - result.commands|length == 0
  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
