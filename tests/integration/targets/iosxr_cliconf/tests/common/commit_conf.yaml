---
- ansible.builtin.debug:
    msg: START iosxr_cliconf integration tests on connection={{ ansible_connection }}

- block:
    - name: Remove interfaces from configuration before actual testing
      ignore_errors: true
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777

    - name: Apply interface description
      register: result
      cisco.iosxr.iosxr_interfaces:
        state: merged
        config:
          - name: loopback 777
            description: TestCommitConfirmed

    - name: Do commit confirmed
      cisco.iosxr.iosxr_command:
        commands:
          - commit confirmed
      when: result["changed"] == true

    - name: Sleep for 35 sec.
      ansible.builtin.wait_for:
        timeout: 35
      when: result["changed"] == true

    - name: Get interface description
      register: get_desc
      iosxr_command:
        commands:
          - show running-config interface loopback 777 description
      ignore_errors: true

    - ansible.builtin.assert:
        that:
          - "'TestCommitConfirmed' in get_desc.stdout[0]"

  always:
    # "commit confirmed" (no timeout) uses the IOS-XR default of 10 minutes.
    # A trial can only be confirmed from the session that created it.
    # The persistent connection should still hold that session, so a bare
    # "commit" here confirms the trial immediately — avoiding a 10-minute
    # block on all subsequent targets.
    - name: Confirm trial from current persistent session (avoids 10-min block)
      ansible.netcommon.cli_command:
        command: commit
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    - name: Exit config mode
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      loop: [abort, end]

    # Safety net: if the persistent session was dropped (idle timeout, error,
    # etc.) the trial could not be confirmed above.  Detect and wait it out.
    - name: Clear any remaining trial (safety net)
      ansible.builtin.include_tasks: "{{ role_path }}/../prepare_iosxr_tests/tasks/clear_pending_trial_cli.yaml"

    # Now safe to clean up the test interface.
    - name: Remove interfaces from configuration after testing
      ignore_errors: true
      vars:
        ansible_iosxr_commit_confirmed: false
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777
