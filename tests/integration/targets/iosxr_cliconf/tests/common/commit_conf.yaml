---
- ansible.builtin.debug:
    msg: START iosxr_cliconf integration tests on connection={{ ansible_connection }}

- block:
    # Override commit_confirmed for housekeeping tasks — the role-level vars
    # set ansible_iosxr_commit_confirmed: true, which would make every
    # iosxr_config/iosxr_interfaces task create an unwanted trial commit.
    - name: Remove interfaces from configuration before actual testing
      ignore_errors: true
      vars:
        ansible_iosxr_commit_confirmed: false
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777

    - name: Apply interface description
      register: result
      vars:
        ansible_iosxr_commit_confirmed: false
      cisco.iosxr.iosxr_interfaces:
        state: merged
        config:
          - name: loopback 777
            description: TestCommitConfirmed

    # Explicitly enter config mode first so "commit confirmed" runs in the
    # correct context.  Use a 60-second timeout (not the 10-minute default)
    # so the safety-net wait in clear_pending_trial_cli.yaml (70 s) is enough.
    - name: Enter config mode for commit confirmed
      ansible.netcommon.cli_command:
        command: configure terminal
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      when: result["changed"] == true

    - name: Do commit confirmed (60 s timeout)
      ansible.netcommon.cli_command:
        command: commit confirmed 60
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      when: result["changed"] == true

    - name: Sleep for 35 sec.
      ansible.builtin.wait_for:
        timeout: 35
      when: result["changed"] == true

    - name: Get interface description
      register: get_desc
      iosxr_command:
        commands:
          - show running-config interface loopback 777 description
      ignore_errors: true

    - ansible.builtin.assert:
        that:
          - "'TestCommitConfirmed' in get_desc.stdout[0]"

  always:
    # The persistent connection may still hold the config session that created
    # the trial.  A bare "commit" from that session confirms the trial
    # immediately, avoiding a 60 s wait for expiry.
    - name: Confirm trial from current persistent session (avoids wait)
      ansible.netcommon.cli_command:
        command: commit
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    - name: Exit config mode
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      loop: [abort, end]

    # Safety net: if the persistent session was dropped (idle timeout, error,
    # etc.) the trial could not be confirmed above.  Detect and wait it out.
    - name: Clear any remaining trial (safety net)
      ansible.builtin.include_tasks: "{{ role_path }}/../prepare_iosxr_tests/tasks/clear_pending_trial_cli.yaml"

    # Now safe to clean up the test interface.
    # Override commit_confirmed to avoid creating a new trial during cleanup.
    - name: Remove interfaces from configuration after testing
      ignore_errors: true
      vars:
        ansible_iosxr_commit_confirmed: false
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777
