---
- ansible.builtin.debug:
    msg: START iosxr_cliconf integration tests on connection={{ ansible_connection }}

- block:
    - name: Remove interfaces from configuration before actual testing
      ignore_errors: true
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777

    - name: Apply interface description
      register: result
      cisco.iosxr.iosxr_interfaces:
        state: merged
        config:
          - name: loopback 777
            description: TestCommitConfirmed

    - name: Do commit confirmed
      cisco.iosxr.iosxr_command:
        commands:
          - commit confirmed
      when: result["changed"] == true

    - name: Sleep for 35 sec.
      ansible.builtin.wait_for:
        timeout: 35
      when: result["changed"] == true

    - name: Get interface description
      register: get_desc
      iosxr_command:
        commands:
          - show running-config interface loopback 777 description
      ignore_errors: true

    - ansible.builtin.assert:
        that:
          - "'TestCommitConfirmed' in get_desc.stdout[0]"
  always:
    # Step 1: exit any stale config submode and confirm / wait out any active trial.
    # iosxr_command: [commit confirmed] (above) may leave the session in config mode
    # with a trial active; a direct cleanup commit would fail with
    # "Cannot commit because there is an unexpired trial/rollback session".
    # Retry "commit" with a delay so the trial can expire before we proceed.
    - name: Exit any config submode before cleanup
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      loop:
        - abort
        - abort
        - end
        - end

    - name: Enter config mode for trial-clear commit
      ansible.netcommon.cli_command:
        command: configure terminal
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    - name: Confirm active trial or wait for it to expire before cleanup
      ansible.netcommon.cli_command:
        command: commit
      vars:
        ansible_connection: ansible.netcommon.network_cli
      register: _cliconf_trial_clear
      failed_when: false
      retries: 7
      delay: 10
      until: >-
        _cliconf_trial_clear.stdout is not defined
        or 'unexpired trial' not in (_cliconf_trial_clear.stdout | default(''))

    - name: Exit config mode after trial clear
      ansible.netcommon.cli_command:
        command: end
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    # Step 2: now that no trial is active, remove the test interface normally.
    - name: Remove interfaces from configuration after testing
      ignore_errors: true
      vars:
        ansible_iosxr_commit_confirmed: false
      cisco.iosxr.iosxr_config:
        lines:
          - no interface loopback 777
