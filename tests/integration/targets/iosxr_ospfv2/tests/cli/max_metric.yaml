---
- ansible.builtin.debug:
    msg: START iosxr_ospfv2 max_metric integration tests on connection={{ ansible_connection }}

- ansible.builtin.include_tasks: _remove_config.yaml

- block:
    - name: Test max-metric router-lsa basic configuration (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id001
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  set: true
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa' in result.commands"

    - name: Test max-metric router-lsa basic configuration (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id001

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with external-lsa set (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id002
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    set: true
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa external-lsa' in result.commands"

    - name: Test max-metric with external-lsa set (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id002

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with external-lsa max_metric_value (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id003
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    max_metric_value: 150
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa external-lsa 150' in result.commands"

    - name: Test max-metric with external-lsa max_metric_value (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id003

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with summary-lsa set (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id004
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  summary_lsa:
                    set: true
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa summary-lsa' in result.commands"

    - name: Test max-metric with summary-lsa set (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id004

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with summary-lsa max_metric_value (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id005
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  summary_lsa:
                    max_metric_value: 250
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa summary-lsa 250' in result.commands"

    - name: Test max-metric with summary-lsa max_metric_value (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id005

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with on-startup wait_period (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id006
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  on_startup:
                    wait_period: 300
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa on-startup 300' in result.commands"

    - name: Test max-metric with on-startup wait_period (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id006

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with on-startup wait_for_bgp (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id007
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  on_startup:
                    wait_for_bgp: true
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa on-startup wait-for-bgp' in result.commands"

    - name: Test max-metric with on-startup wait_for_bgp (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id007

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with include-stub (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id008
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  include_stub: true
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa include-stub' in result.commands"

    - name: Test max-metric with include-stub (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id008

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric with complex combination (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2: &id009
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  on_startup:
                    wait_period: 300
                  external_lsa:
                    max_metric_value: 150
                  include_stub: true
                  summary_lsa:
                    max_metric_value: 250
        state: merged

    - name: Assert that correct set of commands were generated
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa on-startup 300 external-lsa 150 include-stub summary-lsa 250' in result.commands"

    - name: Test max-metric with complex combination (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id009

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric value override for external_lsa (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    set: true
                    max_metric_value: 100
        state: merged

    - name: Assert that max_metric_value takes precedence over set
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'max-metric router-lsa external-lsa 100' in result.commands"
          - "'max-metric router-lsa external-lsa' not in result.commands or 'external-lsa 100' in result.commands"

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric value override for summary_lsa (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  summary_lsa:
                    set: true
                    max_metric_value: 200
        state: merged

    - name: Assert that max_metric_value takes precedence over set
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'max-metric router-lsa summary-lsa 200' in result.commands"
          - "'max-metric router-lsa summary-lsa' not in result.commands or 'summary-lsa 200' in result.commands"

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Test max-metric wait_for_bgp override for on_startup (merged)
      register: result
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  on_startup:
                    wait_period: 300
                    wait_for_bgp: true
        state: merged

    - name: Assert that wait_for_bgp takes precedence over wait_period
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'max-metric router-lsa on-startup wait-for-bgp' in result.commands"
          - "'on-startup 300' not in result.commands or 'wait-for-bgp' in result.commands"

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Setup max-metric for replaced state test
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    set: true
        state: merged

    - name: Test max-metric replaced state
      register: result
      cisco.iosxr.iosxr_ospfv2: &id010
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    max_metric_value: 100
        state: replaced

    - name: Assert that correct set of commands were generated for replaced
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa external-lsa 100' in result.commands"

    - name: Test max-metric replaced state (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id010

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Setup max-metric for overridden state test
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    set: true
            - process_id: 200
              cost: 5
        state: merged

    - name: Test max-metric overridden state
      register: result
      cisco.iosxr.iosxr_ospfv2: &id011
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  summary_lsa:
                    max_metric_value: 200
        state: overridden

    - name: Assert that correct set of commands were generated for overridden
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 200' in result.commands"
          - "'no cost 5' in result.commands"
          - "'router ospf 100' in result.commands"
          - "'max-metric router-lsa summary-lsa 200' in result.commands"

    - name: Test max-metric overridden state (idempotent)
      register: result
      cisco.iosxr.iosxr_ospfv2: *id011

    - name: Assert that the previous task was idempotent
      ansible.builtin.assert:
        that:
          - result.changed == false
          - result.commands|length == 0

    - ansible.builtin.include_tasks: _remove_config.yaml

    - name: Setup max-metric for deleted state test
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    max_metric_value: 100
              cost: 5
        state: merged

    - name: Test max-metric deleted state
      register: result
      cisco.iosxr.iosxr_ospfv2:
        config:
          processes:
            - process_id: 100
              max_metric:
                router_lsa:
                  external_lsa:
                    max_metric_value: 100
        state: deleted

    - name: Assert that correct set of commands were generated for deleted
      ansible.builtin.assert:
        that:
          - result.changed == true
          - "'router ospf 100' in result.commands"
          - "'no max-metric router-lsa external-lsa 100' in result.commands"

  always:
    - ansible.builtin.include_tasks: _remove_config.yaml
