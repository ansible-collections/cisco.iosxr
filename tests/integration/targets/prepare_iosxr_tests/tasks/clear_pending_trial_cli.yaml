---
# Clear any active IOS-XR "commit confirmed" trial so subsequent commits succeed.
#
# When a trial is active from another session, "commit" returns:
#   "% Cannot commit because there is an unexpired trial/rollback session ..."
#   "% Failed to commit ..."
#
# The terminal plugin (terminal/iosxr.py) has "Failed to commit" in its
# terminal_stderr_re list, so network_cli raises AnsibleConnectionFailure and
# the error text lands in the task's `msg` field — NOT in `stdout`.
# Both fields must be checked to detect the trial.
#
# A trial can only be confirmed from the session that created it.  From a
# new session we must wait for the trial timer to expire (longest test trial
# is 60 s; we wait 70 s for margin).  The retry loop handles edge cases
# where a longer trial somehow leaks (retries × 70 s = 210 s total).

- name: Reset network_cli session (drop stale config submode)
  ansible.builtin.meta: reset_connection

- name: Escape leftover configuration context
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  vars:
    ansible_connection: ansible.netcommon.network_cli
  failed_when: false
  loop: [abort, abort, end, end]

# ── Probe-and-wait loop (up to 3 attempts × 70 s = 210 s max) ──────────
- name: Initialize trial retry counter
  ansible.builtin.set_fact:
    _trial_retries_left: 3
    _trial_cleared: false

- name: "Trial-clear loop: probe, wait if needed, verify"
  ansible.builtin.include_tasks: _trial_clear_once.yaml
  when: not (_trial_cleared | bool)
  loop: [1, 2, 3]
  loop_control:
    loop_var: _trial_attempt
