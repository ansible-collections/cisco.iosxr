---
# Clear any active IOS-XR "commit confirmed" trial so subsequent commits succeed.
#
# When a trial is active from another session, "commit" returns:
#   "% Cannot commit because there is an unexpired trial/rollback session ..."
#   "% Failed to commit ..."
#
# The terminal plugin (terminal/iosxr.py) has "Failed to commit" in its
# terminal_stderr_re list, so network_cli raises AnsibleConnectionFailure and
# the error text lands in the task's `msg` field — NOT in `stdout`.
# Both fields must be checked to detect the trial.
#
# A trial can only be confirmed from the session that created it.  From a
# new session we must wait for the trial timer to expire (longest test trial
# is 60 s; we wait 70 s for margin).

- name: Reset network_cli session (drop stale config submode)
  ansible.builtin.meta: reset_connection

- name: Escape leftover configuration context
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  vars:
    ansible_connection: ansible.netcommon.network_cli
  failed_when: false
  loop: [abort, abort, end, end]

- name: Enter configuration mode for trial probe
  ansible.netcommon.cli_command:
    command: configure terminal
  vars:
    ansible_connection: ansible.netcommon.network_cli
  failed_when: false

- name: "Probe: attempt commit to detect active trial"
  ansible.netcommon.cli_command:
    command: commit
  vars:
    ansible_connection: ansible.netcommon.network_cli
  register: _trial_probe
  failed_when: false

- name: Exit configuration mode after probe
  ansible.netcommon.cli_command:
    command: end
  vars:
    ansible_connection: ansible.netcommon.network_cli
  failed_when: false

# Concatenate stdout and msg so the check works regardless of where the
# device error landed (see header comment about terminal_stderr_re).
- name: Evaluate probe result for active trial
  ansible.builtin.set_fact:
    _trial_active: >-
      {{ 'Cannot commit' in
         ((_trial_probe.stdout | default('')) ~ ' ' ~ (_trial_probe.msg | default(''))) }}

- when: _trial_active | bool
  block:
    - name: "Active trial detected — waiting 70 s for it to expire"
      ansible.builtin.wait_for:
        timeout: 70

    - name: Reset connection after trial expiry wait
      ansible.builtin.meta: reset_connection

    - name: Escape configuration context after reset
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
      loop: [abort, end]

    - name: Enter configuration mode for verification
      ansible.netcommon.cli_command:
        command: configure terminal
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    - name: "Verify: commit should succeed now (trial expired)"
      ansible.netcommon.cli_command:
        command: commit
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false

    - name: Exit configuration mode after verification
      ansible.netcommon.cli_command:
        command: end
      vars:
        ansible_connection: ansible.netcommon.network_cli
      failed_when: false
