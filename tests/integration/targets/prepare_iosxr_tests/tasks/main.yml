---
# Clear any active trial/rollback session so commits can succeed.
# IOS-XR blocks new commits while "commit confirmed" (trial) is active; running
# a single "commit" in config mode confirms the trial and unblocks the device.
# Active trials can be left by: iosxr_cliconf (commit_conf) cleanup, or a failed
# iosxr_config commit_confirmed test, or a previous CI run that did not finish.
- name: Clear unexpired trial/rollback session if present (unblocks commit)
  cisco.iosxr.iosxr_config:
    lines:
      - commit
    match: none
  vars:
    ansible_connection: ansible.netcommon.network_cli
  failed_when: false

- name: Ensure we have loopback 888 for testing
  cisco.iosxr.iosxr_config:
    src: config.j2
  vars:
    ansible_connection: ansible.netcommon.network_cli

- name: Enable netconf service
  cisco.iosxr.iosxr_netconf:
    netconf_port: 830
    netconf_vrf: default
    state: present
  vars:
    ansible_connection: ansible.netcommon.network_cli
  tags:
    - netconf

- name: Set facts
  ansible.builtin.set_fact:
    shorter_hostname: '{{ inventory_hostname_short | truncate(10, True, "") }}'
