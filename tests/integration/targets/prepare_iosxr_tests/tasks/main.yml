---
# Clear any active trial/rollback session (see clear_pending_trial_cli.yaml).
# Active trials can be left by: iosxr_cliconf (commit_conf) cleanup, or a failed
# iosxr_config commit_confirmed test, or a previous CI run that did not finish.
- name: Clear unexpired trial/rollback session if present (unblocks commit)
  ansible.builtin.include_tasks: clear_pending_trial_cli.yaml

- name: Ensure we have loopback 888 for testing
  cisco.iosxr.iosxr_config:
    src: config.j2
  vars:
    ansible_connection: ansible.netcommon.network_cli
    # Guard against parent roles (e.g. iosxr_cliconf) whose vars/main.yaml
    # sets ansible_iosxr_commit_confirmed: true — we never want a trial here.
    ansible_iosxr_commit_confirmed: false

- name: Enable netconf service
  cisco.iosxr.iosxr_netconf:
    netconf_port: 830
    netconf_vrf: default
    state: present
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_iosxr_commit_confirmed: false
  tags:
    - netconf

- name: Set facts
  ansible.builtin.set_fact:
    shorter_hostname: '{{ inventory_hostname_short | truncate(10, True, "") }}'
